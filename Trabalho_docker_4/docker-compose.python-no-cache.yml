services:
  api:
    image: linkextractor-api:python-nocache
    build:
      context: ./api
      dockerfile: Dockerfile.python-nocache
    ports:
      - "5000:5000"
  web:
    image: linkextractor-web:php
    build: ./www
    ports:
      - "80:80"
    environment:
      - API_ENDPOINT=http://api:5000/api/
    depends_on:
      - api
  locust:
    image: locustio/locust:2.43.4
    ports:
      - "8089:8089"
    volumes:
      - ./:/mnt/locust:ro
    working_dir: /mnt/locust
    depends_on:
      - api
    command:
      - -f
      - /mnt/locust/loadtest/locustfile.py
      - --web-host
      - "0.0.0.0"
      - --web-port
      - "8089"
      - --host
      - http://api:5000
