version: '3'

services:
  api:
    image: linkextractor-api:ruby
    build:
      context: ./api
      dockerfile: Dockerfile.ruby
    ports:
      - "4567:4567"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - test-net

  web:
    image: linkextractor-web:php
    build: ./www
    ports:
      - "80:80"
    environment:
      - API_ENDPOINT=http://api:4567/api/
    depends_on:
      - api
    networks:
      - test-net

  redis:
    image: redis
    ports:
      - "6379:6379"
    networks:
      - test-net

networks:
  test-net:
